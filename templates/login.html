{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>Login</h2>

<form method="POST" class="card p-4 shadow">

{{ form.hidden_tag() }}

<div class="mb-3">
{{ form.username.label }}
{{ form.username(class="form-control") }}
</div>


<div class="mb-3">
{{ form.password.label }}
{{ form.password(class="form-control") }}
</div>


{{ form.submit(class="btn btn-primary") }}

</form>

</div>

{% endblock %}
