{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <img src="{{ news.image }}" class="card-img-top">

        <div class="card-body">

            <span class="badge bg-primary mb-2">
                {{ news.category }}
            </span>

            <h2 class="mb-3">{{ news.title }}</h2>

            <p class="text-muted">
                By {{ news.author }} • {{ news.created_at.strftime('%Y-%m-%d') }}
            </p>

            <hr>

            <p style="font-size: 18px; line-height: 1.7;">
                {{ news.description }}
            </p>

            <hr>

            <!-- ACTION BUTTONS -->
            <a href="/edit-news/{{ news.id }}" class="btn btn-warning">
                ✏️ Edit
            </a>

            <a href="/delete-news/{{ news.id }}" class="btn btn-danger"
               onclick="return confirm('Are you sure you want to delete this news?')">
                🗑 Delete
            </a>

            <a href="/news" class="btn btn-secondary">
                ⬅ Back
            </a>

        </div>

    </div>

</div>

{% endblock %}
